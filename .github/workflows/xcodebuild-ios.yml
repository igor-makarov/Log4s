name: xcodebuild iOS

jobs:
  xcodebuild-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      # Force CoreSimulator to enumerate its devices. Immediately after
      # `maxim-lobanov/setup-xcode` switches Xcode, the CoreSimulator service
      # is sometimes still warming up and `xcodebuild test` hits a race where
      # it only sees the "Any iOS Simulator Device" placeholder and fails
      # with "Unable to find a device matching the provided destination".
      # A single `simctl list` poke is enough to force enumeration.
      - name: Warm up CoreSimulator
        run: xcrun simctl list devices available

      # `name=` is required for `xcodebuild test` (it refuses generic
      # destinations). Bump it when Xcode upgrades its default device
      # ("iPhone 15" → "iPhone 16" → …); `OS=latest` picks the newest
      # available iOS runtime. xcodebuild drives the SwiftPM package
      # directly via the synthetic scheme generated from Package.swift —
      # no .xcodeproj / .xcworkspace required.
      - run: xcodebuild test -scheme Log4swift -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'

"on":
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
