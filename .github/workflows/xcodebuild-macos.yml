name: xcodebuild macOS

jobs:
  xcodebuild-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      # AppleUnifiedLoggerAppenderTests verify messages via `log show`, which
      # only reports persisted entries. Debug-level messages are dropped by
      # default; `persist:debug` tells the unified log daemon to keep them.
      - name: Configure unified logger
        run: |
          sudo log config --mode "level:off"
          sudo log config --mode "level:debug,persist:debug" --subsystem com.apple.dt.xctest.tool

      # xcodebuild drives the SwiftPM package directly via the synthetic
      # scheme generated from Package.swift — no .xcodeproj / .xcworkspace
      # required.
      - run: xcodebuild test -scheme Log4swift -destination 'platform=macOS'

"on":
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
