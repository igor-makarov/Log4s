name: xcodebuild macOS

jobs:
  xcodebuild-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      # Some tests exercise ASL / unified logging — route xctest logs through
      # the unified log so the assertions can read them back.
      - name: Configure unified logger
        run: |
          sudo log config --mode "level:off"
          sudo log config --mode "level:debug" --subsystem com.apple.dt.xctest.tool

      # xcodebuild drives the SwiftPM package directly via the synthetic
      # scheme generated from Package.swift — no .xcodeproj / .xcworkspace
      # required.
      - run: xcodebuild test -scheme Log4swift -destination 'platform=macOS'

"on":
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
