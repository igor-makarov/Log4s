name: xcodebuild watchOS

# Build-only: the existing test target references NSLoggerAppender / ASL APIs
# that are not available on watchOS, so `xcodebuild test` would fail to
# compile the tests. Building proves the library cross-compiles cleanly.

jobs:
  xcodebuild-watchos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      # xcodebuild drives the SwiftPM package directly via the synthetic
      # scheme generated from Package.swift — no .xcodeproj / .xcworkspace
      # required.
      - run: xcodebuild build -scheme Log4swift -destination 'generic/platform=watchOS'

"on":
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
