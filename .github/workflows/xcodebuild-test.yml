name: xcodebuild test

jobs:
  xcodebuild-test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            # Host destination — no simulator needed.
            destination: platform=macOS
          - platform: iOS
            # Resolved at runtime from the simulators available on the
            # runner so the workflow doesn't rot when Xcode renames devices.
            destination: ''
            runtime_family: iOS
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Some tests exercise ASL / unified logging — route xctest logs
      # through the unified log so the assertions can read them back.
      - name: Configure unified logger
        run: |
          sudo log config --mode "level:off"
          sudo log config --mode "level:debug" --subsystem com.apple.dt.xctest.tool

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Resolve simulator destination
        if: matrix.runtime_family != ''
        id: dest
        run: |
          set -euo pipefail
          FAMILY='${{ matrix.runtime_family }}'
          UDID=$(xcrun simctl list -j devices available \
            | jq -r --arg f "$FAMILY" '
                [ .devices
                  | to_entries[]
                  | select(.key | contains("SimRuntime." + $f + "-"))
                  | .value[]
                  | select(.isAvailable)
                  | .udid
                ] | last // empty
              ')
          if [ -z "$UDID" ]; then
            echo "No available $FAMILY simulator on this runner." >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "destination=platform=${FAMILY} Simulator,id=${UDID}" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test (${{ matrix.platform }})
        env:
          DESTINATION: ${{ matrix.destination != '' && matrix.destination || steps.dest.outputs.destination }}
        run: |
          xcodebuild test \
            -scheme Log4swift \
            -destination "$DESTINATION"

  xcodebuild-watchos-build:
    # watchOS is build-only: the existing test target references
    # NSLoggerAppender / ASL APIs that aren't available on watchOS, so
    # `xcodebuild test` would fail to compile the tests. Building proves
    # the library itself cross-compiles cleanly.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: xcodebuild build (watchOS)
        run: |
          xcodebuild build \
            -scheme Log4swift \
            -destination 'generic/platform=watchOS'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
