name: swift test

jobs:
  swift-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Some tests exercise ASL / unified logging — route xctest logs through
      # the unified log so the assertions can read them back.
      - name: Configure unified logger
        run: |
          sudo log config --mode "level:off"
          sudo log config --mode "level:debug" --subsystem com.apple.dt.xctest.tool

      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0,1,2,3,4'
